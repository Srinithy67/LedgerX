<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload · PocketPetal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="/css/pocketpetal.css" rel="stylesheet"/>
  <script src="/js/shared.js" defer></script>
</head>
<body data-page="upload" data-auth-required="true" data-page-title="Upload Expenses">

  <div id="pp-page-content" style="display:none">
    <h1 class="pp-hero-title" style="font-size:1.6rem">📸 Upload screenshot</h1>
    <p class="pp-hero-sub">Drop your receipts here — PocketPetal will bloom them into categorized entries.</p>

    <div class="pp-dropzone" id="drop-zone">
      <div style="font-size:2.5rem;margin-bottom:12px" id="upload-icon">☁️</div>
      <p style="font-weight:700;font-size:1rem;margin:0 0 6px" id="upload-title">Drag & drop receipts here</p>
      <p style="color:var(--pp-text-muted);font-size:0.85rem;margin:0 0 20px" id="upload-desc">PNG or JPEG · up to 10MB</p>
      <button type="button" class="pp-btn pp-btn-primary" id="choose-btn">Choose file</button>
      <input id="file-input" type="file" accept="image/*" hidden/>
    </div>

    <div style="margin-top:28px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <p class="pp-section-title" style="margin:0">Pending additions <span id="pending-count" style="font-size:0.75rem;background:var(--pp-primary-soft);color:var(--pp-primary);padding:2px 10px;border-radius:999px;margin-left:8px">0</span></p>
        <button type="button" id="clear-btn" style="background:none;border:none;color:var(--pp-primary);font-weight:700;font-size:0.82rem;cursor:pointer">Clear all</button>
      </div>
      <div id="pending-list" class="pp-grid pp-grid-2">
        <div class="pp-card" style="grid-column:1/-1;text-align:center;color:var(--pp-text-muted);font-size:0.88rem">
          No receipts yet — upload a screenshot to start OCR scanning.
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = () => PocketPetal.getToken();
    let categories = [];
    let pending = [];

    async function loadCategories() {
      const res = await PocketPetal.authFetch('/api/categories');
      const data = await res.json();
      if (res.ok && data.success) categories = data.data;
    }

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    document.getElementById('choose-btn').onclick = () => fileInput.click();
    dropZone.onclick = (e) => { if (e.target.id !== 'choose-btn') fileInput.click(); };

    ['dragenter','dragover'].forEach(ev => dropZone.addEventListener(ev, e => {
      e.preventDefault(); dropZone.classList.add('active');
    }));
    ['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => {
      e.preventDefault(); dropZone.classList.remove('active');
    }));
    dropZone.addEventListener('drop', e => {
      const f = e.dataTransfer.files[0];
      if (f) uploadFile(f);
    });
    fileInput.onchange = e => { if (e.target.files[0]) uploadFile(e.target.files[0]); };

    function setUploading(on) {
      document.getElementById('upload-icon').textContent = on ? '⏳' : '☁️';
      document.getElementById('upload-title').textContent = on ? 'Reading your receipt…' : 'Drag & drop receipts here';
      document.getElementById('upload-desc').textContent = on ? 'OCR scanner is working its magic' : 'PNG or JPEG · up to 10MB';
    }

    async function uploadFile(file) {
      setUploading(true);
      const fd = new FormData();
      fd.append('receipt', file);
      try {
        const res = await PocketPetal.authFetch('/api/ocr', {
          method: 'POST',
          body: fd,
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'OCR failed');
        const s = data.data;
        if (!s.shouldSuggest) {
          alert(`Credit transaction detected — skipped per policy.`);
        } else {
          pending.push({
            id: Date.now().toString(),
            merchantName: s.merchantName,
            amount: s.amount,
            date: s.date ? s.date.split('T')[0] : new Date().toISOString().split('T')[0],
            categoryId: s.categoryId,
            confidence: s.confidence,
            paymentMethod: 'Debit Card',
            description: `Visit to ${s.merchantName}`,
          });
          renderPending();
        }
      } catch (e) { alert(e.message); }
      finally { setUploading(false); fileInput.value = ''; }
    }

    function renderPending() {
      document.getElementById('pending-count').textContent = pending.length;
      const el = document.getElementById('pending-list');
      if (!pending.length) {
        el.innerHTML = '<div class="pp-card" style="grid-column:1/-1;text-align:center;color:var(--pp-text-muted);font-size:0.88rem">No receipts yet — upload a screenshot to start OCR scanning.</div>';
        return;
      }
      el.innerHTML = pending.map(item => {
        const opts = categories.map(c =>
          `<option value="${c.id}" ${item.categoryId === c.id ? 'selected' : ''}>${c.name}</option>`
        ).join('');
        return `<div class="pp-card">
          <div style="display:flex;justify-content:space-between;margin-bottom:12px">
            <span style="font-size:0.72rem;font-weight:700;background:var(--pp-secondary-soft);color:var(--pp-secondary);padding:3px 10px;border-radius:999px">✓ ${item.confidence}% match</span>
            <button type="button" onclick="removeItem('${item.id}')" style="background:none;border:none;cursor:pointer;font-size:1.1rem">✕</button>
          </div>
          <input class="pp-input" value="${item.merchantName}" onchange="updateItem('${item.id}','merchantName',this.value)" style="font-weight:700;margin-bottom:8px"/>
          <input class="pp-input" type="date" value="${item.date}" onchange="updateItem('${item.id}','date',this.value)" style="margin-bottom:8px"/>
          <input class="pp-input" value="${item.description}" onchange="updateItem('${item.id}','description',this.value)" style="margin-bottom:8px"/>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input class="pp-input" type="number" step="0.01" value="${item.amount}" onchange="updateItem('${item.id}','amount',parseFloat(this.value))" style="flex:1"/>
            <select class="pp-select" onchange="updateItem('${item.id}','categoryId',this.value)" style="flex:1"><option value="">Uncategorized</option>${opts}</select>
          </div>
          <button class="pp-btn pp-btn-primary" style="width:100%;justify-content:center" onclick="saveItem('${item.id}')">Bloom into journal →</button>
        </div>`;
      }).join('');
    }

    window.removeItem = id => { pending = pending.filter(p => p.id !== id); renderPending(); };
    window.updateItem = (id, key, val) => { const i = pending.find(p => p.id === id); if (i) i[key] = val; };
    document.getElementById('clear-btn').onclick = () => { pending = []; renderPending(); };

    window.saveItem = async id => {
      const item = pending.find(p => p.id === id);
      if (!item) return;
      try {
        const res = await PocketPetal.authFetch('/api/expenses', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount: item.amount, description: item.description,
            categoryId: item.categoryId || null,
            paymentMethod: item.paymentMethod,
            date: new Date(item.date).toISOString(),
          }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error);
        pending = pending.filter(p => p.id !== id);
        renderPending();
      } catch (e) { alert(e.message); }
    };

    document.addEventListener('DOMContentLoaded', loadCategories);
  </script>
</body>
</html>
